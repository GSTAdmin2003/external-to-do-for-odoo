appId: com.odootodo.app
productName: Odoo Todo

directories:
  buildResources: resources
  output: dist

files:
  - out/**/*
  - node_modules/**/*
  - package.json

publish:
  provider: github
  owner: GSTAdmin2003
  repo: external-to-do-for-odoo

protocols:
  - name: Odoo To-Do Setup
    schemes:
      - odootodo

linux:
  target:
    - target: AppImage
      arch: [x64]
  category: Utility
  mimeTypes:
    - x-scheme-handler/odootodo

win:
  target:
    - target: nsis
      arch: [x64]

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  category: public.app-category.productivity
