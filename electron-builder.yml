appId: com.odootodo.app
productName: Odoo Todo
directories:
  buildResources: resources
  output: dist

files:
  - out/**/*
  - node_modules/**/*
  - package.json

protocols:
  - name: Odoo To-Do Setup
    schemes:
      - odootodo

linux:
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  category: Utility
  mimeTypes:
    - x-scheme-handler/odootodo

win:
  target: nsis
